{% extends "base.html" %}
{% block title %}Register - Skill Swap Hub{% endblock %}

{% block content %}

<header class="masthead" style="background-image: url({{ url_for('static', filename='assets/img/home-bg.webp') }})">
    <div class="container">
        <div class="site-heading text-center text-white">
            <h1>Create Account</h1>
        </div>
    </div>
</header>

<div class="container px-4 px-lg-5 mt-5">
    <form method="POST" action="{{ url_for('register') }}" enctype="multipart/form-data">

        <div class="form-floating mb-3">
            <input class="form-control"
                   name="username"
                   type="text"
                   placeholder="Username"
                   required>
            <label>Username *</label>
        </div>

        <div class="form-floating mb-3">
            <input class="form-control"
                   name="email"
                   type="email"
                   placeholder="Email"
                   required>
            <label>Email *</label>
        </div>

        <div class="form-floating mb-3">
            <input class="form-control"
                   name="password"
                   type="password"
                   placeholder="Password"
                   required>
            <label>Password *</label>
        </div>

        <div class="mb-3">
            <label class="form-label">Profile Photo</label>
            <input class="form-control"
                   name="profile_photo"
                   type="file"
                   accept="image/*">
        </div>

        <div class="form-floating mb-3">
            <input class="form-control"
                   name="hobbies"
                   type="text"
                   placeholder="Hobbies or skills">
            <label>Hobbies or Skills</label>
        </div>

        <div class="form-floating mb-3">
            <textarea class="form-control"
                      name="bio"
                      placeholder="Tell us about yourself"
                      style="height: 6rem"></textarea>
            <label>Bio</label>
        </div>

        <button class="btn btn-primary w-100" type="submit">
            Register
        </button>
    </form>

    <p class="mt-3 text-center">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>

{% endblock %}
